name: Update data and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 15 * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.data_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Refresh visa bulletin data
        run: |
          uv run python scripts/download_visa_bulletins.py
          uv run python scripts/parse_eb_tables.py
          uv run python scripts/export_china_series_json.py

      - name: Commit refreshed data
        id: commit
        run: |
          if git diff --quiet -- data web/src/data; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data web/src/data
          git commit -m "Update visa bulletin data"
          git push
          echo "data_changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull data commit from update job
        if: needs.update-data.outputs.data_changed == 'true'
        run: git pull

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build site
        run: npm run build
        working-directory: web
        env:
          GITHUB_PAGES: "true"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
